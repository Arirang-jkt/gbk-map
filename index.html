var map = L.map('map').setView([-6.2186, 106.8022], 14);

function route(from, to, color, weight = 2) {
    return L.Routing.control({
        waypoints: [L.latLng(from[0], from[1]), L.latLng(to[0], to[1])],
        router: L.Routing.osrmv1({
            serviceUrl: "https://router.project-osrm.org/route/v1"
        }),
        lineOptions: {
            styles: [{ color: color, weight: weight, opacity: 0.9 }]
        },
        addWaypoints: false,
        draggableWaypoints: false,
        routeWhileDragging: false,
        show: false,
        createMarker: () => null
    }).addTo(map);
}

    '106.79692687974158,-6.189631135415259'    // TJ Kemanggisan (STOP)
    + '?overview=full&geometries=geojson'
)
.then(res => res.json())
.then(data => {
    const coords = data.routes[0].geometry.coordinates;

    const latlngs = coords.map(c => [c[1], c[0]]);

    L.polyline(latlngs, {
        color: "#d32f2f",
        weight: 2,
        opacity: 0.9,
        lineCap: "round",
        lineJoin: "round"
    }).addTo(map);
});

    latlngs = latlngs.filter((p, i) => {
        return i < latlngs.length - 2; // drop last noisy segment

    // add exact stop point
    latlngs.push([
        -6.175577821955303,
        106.79211846337199
    ]);

        opacity: 0.9,
        lineCap: "round",

    }).addTo(map);
