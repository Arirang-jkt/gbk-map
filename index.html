<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GBK Transport Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
    height: 100vh;
    width: 100%;
}

/* ===================== */
/* MOBILE FIX            */
/* ===================== */
@media (max-width: 600px) {
    .leaflet-control {
        transform: scale(0.9);
    }
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =====================
// INIT MAP
// =====================
var map = L.map('map').setView([-6.2186, 106.8022], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);


// =====================
// ICONS
// =====================
var mrtIcon = new L.Icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [30, 50],
    iconAnchor: [15, 50]
});

var tjIcon = new L.Icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [30, 50],
    iconAnchor: [15, 50]
});

var krlIcon = new L.Icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [30, 50],
    iconAnchor: [15, 50]
});

var airportIcon = new L.Icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [30, 50],
    iconAnchor: [15, 50]
});


// =====================
// GBK POPUP
// =====================
L.marker([-6.2186,106.8022])
.addTo(map)
.bindPopup(`
<div style="text-align:center;font-family:Arial;">
    <div style="font-size:16px;font-weight:bold;color:#7c3aed;">
        GBK Main Stadium
    </div>

    <div style="margin-top:6px;font-size:13px;color:#a855f7;font-weight:600;">
        BTS WORLD TOUR 'ARIRANG' IN JAKARTA
    </div>

    <div style="margin-top:6px;font-size:12px;color:#666;">
        Gelora Bung Karno Stadium, Jakarta
    </div>
</div>
`);


// =====================
// GBK AREA
// =====================
L.circle([-6.2186,106.8022], {
    radius: 1200,
    color: "red",
    weight: 3,
    fillColor: "#ff0000",
    fillOpacity: 0.15
}).addTo(map);


// =====================
// MRT STATIONS
// =====================
const mrtStations = [
["Lebak Bulus Grab",-6.2933,106.7817],
["Fatmawati",-6.2883,106.7944],
["Cipete Raya",-6.2694,106.7964],
["Haji Nawi",-6.2603,106.7950],
["Blok A",-6.2511,106.7922],
["Blok M",-6.2425,106.7958],
["CSW",-6.2331,106.7947],
["Senayan",-6.2283,106.8031],
["Istora Mandiri",-6.2228,106.8075],
["Bendungan Hilir",-6.2156,106.8178],
["Setiabudi",-6.2086,106.8214],
["Dukuh Atas BNI",-6.2039,106.8213],
["Bundaran HI",-6.1933,106.8228]
];

mrtStations.forEach(s => {

    let name = s[0];
    let lat = s[1];
    let lng = s[2];

    let popup = "<b>MRT " + name + "</b>";

    if (name === "Istora Mandiri") {
        popup += "<br>🚶 ±10–12 min ke GBK";
    }

    if (name === "Senayan") {
        popup += "<br>🚶 ±10–13 min ke GBK";
    }

    L.marker([lat, lng], {icon: mrtIcon, riseOnHover: true})
    .addTo(map)
    .bindPopup(popup);

    L.circle([lat, lng], {
        radius: 1200,
        color: "#1e88e5",
        weight: 2,
        fillColor: "#1e88e5",
        fillOpacity: 0.20
    }).addTo(map);

});


// =====================
// MRT LINE
// =====================
L.polyline([
    [-6.2933,106.7817],
    [-6.2883,106.7944],
    [-6.2694,106.7964],
    [-6.2603,106.7950],
    [-6.2511,106.7922],
    [-6.2425,106.7958],
    [-6.2331,106.7947],
    [-6.2283,106.8031],
    [-6.2228,106.8075],
    [-6.2156,106.8178],
    [-6.2086,106.8214],
    [-6.2039,106.8213],
    [-6.1933,106.8228]
], {
    color: "#1e88e5",
    weight: 4,
    opacity: 0.9
}).addTo(map);


// =====================
// TRANSPORT MARKERS
// =====================
L.marker([-6.2245,106.8030], {icon: tjIcon})
.addTo(map)
.bindPopup("<b>TJ Halte GBK</b><br>🚶 ±4–5 min");

L.marker([-6.2076,106.7974], {icon: krlIcon})
.addTo(map)
.bindPopup("<b>KRL Palmerah</b>");

L.marker([-6.1983,106.8213], {icon: krlIcon})
.addTo(map)
.bindPopup("<b>KRL Sudirman (Dukuh Atas)</b>");

L.marker([-6.1989,106.8222], {icon: airportIcon})
.addTo(map)
.bindPopup("<b>BNI City Airport Rail Link</b>");


// =====================
// HUB
// =====================
L.circle([-6.2039,106.8213], {
    radius: 1000,
    color: "purple",
    weight: 3,
    fillColor: "#800080",
    fillOpacity: 0.15
}).addTo(map);


// =====================
// WALKING ROUTES
// =====================
L.polyline([[-6.2186,106.8022],[-6.2283,106.8031]],{
    color:"#424242",weight:4,dashArray:"6,8",opacity:0.9
}).addTo(map);

L.polyline([[-6.2186,106.8022],[-6.2228,106.8075]],{
    color:"#424242",weight:4,dashArray:"6,8",opacity:0.9
}).addTo(map);

L.polyline([[-6.2186,106.8022],[-6.2245,106.8030]],{
    color:"#c62828",weight:4,dashArray:"6,8",opacity:0.9
}).addTo(map);


// =====================
// LEGEND (MOBILE FIXED + CLICKABLE)
// =====================
var legend = L.control({position: "topright"});

legend.onAdd = function () {

    var div = L.DomUtil.create("div");

    div.style.background = "white";
    div.style.padding = "10px 12px";
    div.style.borderRadius = "10px";
    div.style.boxShadow = "0 2px 10px rgba(0,0,0,0.2)";
    div.style.fontSize = "11px";
    div.style.lineHeight = "18px";
    div.style.maxWidth = "160px";
    div.style.zIndex = "1000";

    div.innerHTML = `
        <b>Legend</b><br><br>

        <div style="cursor:pointer;color:#1e88e5;" id="leg-mrt">● MRT Line</div>
        <div style="cursor:pointer;color:#424242;" id="leg-walk">- - Walking Route</div>
        <div style="cursor:pointer;color:red;" id="leg-gbk">● GBK Stadium</div>
        <div style="cursor:pointer;color:green;" id="leg-krl">● KRL Station</div>
        <div style="cursor:pointer;color:purple;" id="leg-hub">● Dukuh Atas Hub</div>
        <div style="cursor:pointer;color:#ffb300;" id="leg-airport">✈ Airport (BNI City)</div>
    `;

    return div;
};

legend.addTo(map);


// =====================
// LEGEND CLICK ACTION
// =====================
document.addEventListener("click", function(e){

    if (e.target.id === "leg-mrt") map.flyTo([-6.2283,106.8031], 15);
    if (e.target.id === "leg-walk") map.flyTo([-6.2186,106.8022], 15);
    if (e.target.id === "leg-gbk") map.flyTo([-6.2186,106.8022], 16);
    if (e.target.id === "leg-krl") map.flyTo([-6.1983,106.8213], 16);
    if (e.target.id === "leg-hub") map.flyTo([-6.2039,106.8213], 16);
    if (e.target.id === "leg-airport") map.flyTo([-6.1989,106.8222], 16);

});

</script>

</body>
</html>
